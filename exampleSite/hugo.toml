baseURL = 'http://localhost:1316/'
languageCode = 'vi-vn'
title = 'FIFA World Cup - Bóng Đá Thế Giới'


# Google Analytics
googleAnalytics = 'G-F11WZVTXFJ'

# Enable robots.txt
enableRobotsTXT = true


# Site Parameters
[params]
description = 'Tin tức mới nhất về FIFA World Cup - World Cup, tin tức về các đội tuyển quốc gia, cầu thủ xuất sắc, kết quả thi đấu, bảng xếp hạng và phân tích chuyên sâu.'
keywords = 'FIFA World Cup, World Cup, bóng đá thế giới, World Cup 2026, World Cup 2030, Brazil, Argentina, Pháp, Đức, Bồ Đào Nha, Messi, Mbappe, Ronaldo'

[params.logo]
emoji = '🏆'
title = 'FIFA World Cup'
subtitle = 'Cập nhật tin tức mới nhất'


[params.home]
# 可选值: "green"(绿色), "purple"(紫色), "red"(红色), "blue"(蓝色),
#         "orange"(橙色), "pink"(粉色), "teal"(青色), "dark"(深色),
#         "yellow"(黄色), "indigo"(靛蓝), "violet"(紫罗兰), "cyan"(青色),
#         "lime"(青柠), "amber"(琥珀色), "rose"(玫瑰红), "emerald"(祖母绿),
#         "slate"(石板灰), "brown"(棕色)
color = 'amber'
# 可选值: "grid", "featured", "compact", "list", "waterfall",
#         "bento", "timeline", "magazine", "zigzag", "focus"
layout = 'waterfall'
# 可选值: "standard", "comic", "star", "cartoon", "ocean", 
#         "gradient", "glass", "diagonal", "orbit", "gallery", 
#         "strip", "confetti", "crystal", "neon", "polaroid", 
#         "minimal", "brutal", "soft", "glitch", "holographic" 
card_style = "comic"
columns = 3
rows = 3
title = 'Tin Tức Mới Nhất'

[params.hero]
title = 'FIFA World Cup'
subtitle = 'Cập nhật tin tức mới nhất'
teams = ['🇧🇷 Brazil', '🇦🇷 Argentina', '🇫🇷 Pháp', '🇩🇪 Đức', '🇪🇸 Tây Ban Nha']

# Social Media
[params.social]
twitter = 'https://twitter.com/FIFAcom'
facebook = 'https://facebook.com/fifaworldcup'
youtube = 'https://youtube.com/FIFATV'
instagram = 'https://instagram.com/fifaworldcup'

# Footer Configuration
[[params.footer.columns]]
title = "Liên kết nhanh"
use_menu = "main"

[[params.footer.columns]]
title = "Giải đấu"
[[params.footer.columns.links]]
text = "World Cup 2026"
url = "/world-cup-2026/"
[[params.footer.columns.links]]
text = "World Cup 2030"
url = "/world-cup-2030/"

[[params.footer.columns]]
title = "Theo dõi chúng tôi"
[[params.footer.columns.links]]
text = "Twitter"
url = "https://twitter.com/FIFAcom"
[[params.footer.columns.links]]
text = "Facebook"
url = "https://facebook.com/fifaworldcup"
[[params.footer.columns.links]]
text = "YouTube"
url = "https://youtube.com/FIFATV"

# Menu
[menu]
[[menu.main]]
name = 'Trang chủ'
url = '/'
weight = 10

[[menu.main]]
name = 'Tin tức'
url = '/posts/'
weight = 20


# Module mounts for local theme development
[module]
[[module.mounts]]
source = "content"
target = "content"

[[module.mounts]]
source = "../layouts"
target = "layouts"

[[module.mounts]]
source = "../static"
target = "static"

[[module.mounts]]
source = "../i18n"
target = "i18n"
