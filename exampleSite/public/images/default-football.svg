<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1b4332"/>
      <stop offset="100%" style="stop-color:#081c15"/>
    </radialGradient>
    <linearGradient id="trophy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD100"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Field lines -->
  <g stroke="#00A651" stroke-width="1" opacity="0.3">
    <line x1="0" y1="75" x2="400" y2="75"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="225" x2="400" y2="225"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
  </g>

  <!-- Center circle -->
  <circle cx="200" cy="150" r="60" fill="none" stroke="#00A651" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="150" r="5" fill="#00A651" opacity="0.5"/>

  <!-- Trophy -->
  <g transform="translate(170, 110)">
    <!-- Trophy cup -->
    <path d="M10 10 L50 10 L55 40 L5 40 Z" fill="url(#trophy)"/>
    <ellipse cx="30" cy="10" rx="20" ry="5" fill="#FFE066"/>
    <!-- Trophy handles -->
    <ellipse cx="5" cy="25" rx="8" ry="12" fill="none" stroke="url(#trophy)" stroke-width="3"/>
    <ellipse cx="55" cy="25" rx="8" ry="12" fill="none" stroke="url(#trophy)" stroke-width="3"/>
    <!-- Trophy stem -->
    <rect x="25" y="40" width="10" height="15" fill="url(#trophy)"/>
    <!-- Trophy base -->
    <rect x="15" y="55" width="30" height="5" fill="url(#trophy)"/>
    <!-- Star on trophy -->
    <text x="30" y="32" text-anchor="middle" font-size="16" fill="#081c15">⭐</text>
  </g>

  <!-- Corner flags -->
  <g fill="#FFD100">
    <polygon points="10,10 25,15 10,20"/>
    <polygon points="390,10 375,15 390,20"/>
    <polygon points="10,290 25,285 10,280"/>
    <polygon points="390,290 375,285 390,280"/>
  </g>

  <!-- Text overlay -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFD100" opacity="0.8">FOOTBALL NEWS</text>
</svg>
